name: Run automated tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install dependencies
        run: dotnet restore
      - name: Build unit test project
        run: dotnet build tests/Mollie.Tests.Unit --configuration Release --no-restore
      - name: Run unit tests
        run: dotnet test tests/Mollie.Tests.Unit --no-restore --verbosity normal
      - name: Build integration test project
        run: dotnet build tests/Mollie.Tests.Integration --configuration Release --no-restore
      - name: Run integration tests
        run: dotnet test tests/Mollie.Tests.Integration --filter "TestCategory!=LocalIntegrationTests" --no-restore --verbosity normal
        env:
          Mollie__ApiKey: ${{ secrets.Mollie__ApiKey }}
          Mollie__AccessKey: ${{ secrets.Mollie__AccessKey }}
          Mollie__ClientId: ${{ secrets.Mollie__ClientId }}
          Mollie__ClientSecret: ${{ secrets.Mollie__ClientSecret }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    env:
      MOLLIE_STRONG_NAME_PUBLIC_KEY: ${{ secrets.MOLLIE_STRONG_NAME_PUBLIC_KEY }}

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install dependencies
        run: dotnet restore
      - name: Prepare strong-name signing key
        shell: bash
        run: |
          if [ -z "${{ secrets.MOLLIE_STRONG_NAME_KEY_BASE64 }}" ]; then
            echo "MOLLIE_STRONG_NAME_KEY_BASE64 secret is not set."
            exit 1
          fi
          if [ -z "$MOLLIE_STRONG_NAME_PUBLIC_KEY" ]; then
            echo "MOLLIE_STRONG_NAME_PUBLIC_KEY secret is not set."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          echo "${{ secrets.MOLLIE_STRONG_NAME_KEY_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/signing/mollie.snk"
          chmod 600 "$RUNNER_TEMP/signing/mollie.snk"
          echo "MOLLIE_STRONG_NAME_KEY_FILE=$RUNNER_TEMP/signing/mollie.snk" >> "$GITHUB_ENV"
      - name: Build Mollie.Api
        run: dotnet build src/Mollie.Api/Mollie.Api.csproj --configuration Release --no-restore /p:MollieStrongNameKeyFile="$MOLLIE_STRONG_NAME_KEY_FILE" /p:MollieStrongNamePublicKey="$MOLLIE_STRONG_NAME_PUBLIC_KEY"
      - name: Build Mollie.Api.AspNet
        run: dotnet build src/Mollie.Api.AspNet/Mollie.Api.AspNet.csproj --configuration Release --no-restore /p:MollieStrongNameKeyFile="$MOLLIE_STRONG_NAME_KEY_FILE" /p:MollieStrongNamePublicKey="$MOLLIE_STRONG_NAME_PUBLIC_KEY"
      - name: Pack Mollie.Api
        run: dotnet pack src/Mollie.Api/Mollie.Api.csproj --configuration Release --no-restore --no-build --output ./nupkgs /p:MollieStrongNameKeyFile="$MOLLIE_STRONG_NAME_KEY_FILE" /p:MollieStrongNamePublicKey="$MOLLIE_STRONG_NAME_PUBLIC_KEY"
      - name: Pack Mollie.Api.AspNet
        run: dotnet pack src/Mollie.Api.AspNet/Mollie.Api.AspNet.csproj --configuration Release --no-restore --no-build --output ./nupkgs /p:MollieStrongNameKeyFile="$MOLLIE_STRONG_NAME_KEY_FILE" /p:MollieStrongNamePublicKey="$MOLLIE_STRONG_NAME_PUBLIC_KEY"
      - name: Push to NuGet
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
